<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo de Perfumes — Scentia Store</title>

  <!-- Bootstrap via WebJars -->
  <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />

  <style>
    body {
      background-color: #f8f5f0;
    }

    .card-perfume {
      transition: transform .2s, box-shadow .2s;
      border: none;
    }

    .card-perfume:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .12);
    }

    .card-img-top {
      height: 220px;
      object-fit: cover;
      background: #ece8e1;
    }

    .badge-disponible {
      background-color: #198754;
    }

    .badge-poco_stock {
      background-color: #ffc107;
      color: #000;
    }

    .badge-agotado {
      background-color: #dc3545;
    }

    .btn-agregar {
      background-color: #4a3728;
      color: #fff;
      border: none;
    }

    .btn-agregar:hover {
      background-color: #6b4f3a;
      color: #fff;
    }

    .section-title {
      font-family: Georgia, serif;
      letter-spacing: .5px;
    }
  </style>
</head>

<body>

  <!-- Navbar fragment -->
  <div th:replace="~{fragmentos/navbar :: navbar}"></div>

  <div class="container my-4">

    <!-- Mensajes flash -->
    <div th:replace="~{fragmentos/navbar :: mensajes}"></div>

    <!-- Encabezado -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
      <h1 class="h3 section-title mb-0">Catálogo de Perfumes</h1>

      <!-- Búsqueda -->
      <form th:action="@{/catalogo}" method="get" class="d-flex gap-2">
        <input type="text" name="buscar" class="form-control form-control-sm" placeholder="Buscar por nombre o marca..."
          th:value="${buscar}" style="min-width:220px" />
        <button type="submit" class="btn btn-sm btn-dark">Buscar</button>
        <a th:href="@{/catalogo}" class="btn btn-sm btn-outline-secondary">Limpiar</a>
      </form>
    </div>

    <div class="row g-4">

      <!-- Sidebar de categorías -->
      <div class="col-12 col-md-3">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Categorías</h6>
            <ul class="list-unstyled mb-0">
              <li class="mb-1">
                <a th:href="@{/catalogo}"
                  th:classappend="${categoriaActiva == null and buscar == null} ? 'fw-bold text-dark' : 'text-secondary'"
                  class="text-decoration-none">
                  Todos los productos
                </a>
              </li>
              <li th:each="cat : ${categorias}" class="mb-1">
                <a th:href="@{/catalogo(categoria=${cat})}" th:text="${cat}"
                  th:classappend="${categoriaActiva == cat} ? 'fw-bold text-dark' : 'text-secondary'"
                  class="text-decoration-none">
                </a>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Grid de productos -->
      <div class="col-12 col-md-9">

        <!-- Sin resultados -->
        <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5 text-muted">
          <p class="fs-5">No se encontraron productos.</p>
          <a th:href="@{/catalogo}" class="btn btn-outline-dark btn-sm">Ver catálogo completo</a>
        </div>

        <!-- Cards de productos -->
        <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 g-4" th:unless="${#lists.isEmpty(productos)}">
          <div class="col" th:each="producto : ${productos}">
            <div class="card card-perfume h-100 shadow-sm">

              <!-- Imagen -->
              <img th:src="${producto.imagenUrl != null and !#strings.isEmpty(producto.imagenUrl)}
                           ? ${producto.imagenUrl}
                           : '/images/placeholder-perfume.jpg'" th:alt="${producto.nombre}" class="card-img-top" />

              <div class="card-body d-flex flex-column">

                <!-- Badge de disponibilidad -->
                <span th:with="disp=${producto.disponibilidad}" class="badge mb-2 align-self-start"
                  th:classappend="'badge-' + ${#strings.toLowerCase(disp.name())}"
                  th:text="${disp.etiqueta}">Disponible</span>

                <!-- Nombre y marca -->
                <h6 class="card-title fw-bold mb-0" th:text="${producto.nombre}">Nombre</h6>
                <small class="text-muted mb-1" th:text="${producto.marca}" th:if="${producto.marca}">Marca</small>

                <!-- Presentación / volumen -->
                <small class="text-secondary mb-2" th:if="${producto.presentacion}"
                  th:text="'Presentación: ' + ${producto.presentacion}"></small>

                <!-- Descripción -->
                <p class="card-text text-muted small flex-grow-1"
                  th:text="${#strings.abbreviate(producto.descripcion, 100)}" th:if="${producto.descripcion}"></p>

                <!-- Precio -->
                <p class="fw-bold fs-5 mb-1 mt-auto"
                  th:text="'₡' + ${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}">
                  ₡0.00
                </p>

                <!-- Stock -->
                <small class="text-muted mb-2" th:text="${producto.stock} + ' unidades disponibles'"
                  th:if="${producto.stock > 0}"></small>
                <small class="text-danger mb-2" th:if="${producto.stock == 0}">Sin stock</small>

                <!-- Formulario agregar al carrito (HU-05) -->
                <form th:action="@{/carrito/agregar}" method="post" th:if="${producto.disponibleParaCompra}"
                  class="d-flex gap-2 mt-1">
                  <input type="hidden" name="productoId" th:value="${producto.id}" />
                  <input type="number" name="cantidad" value="1" min="1" th:max="${producto.stock}"
                    class="form-control form-control-sm" style="width:70px" />
                  <button type="submit" class="btn btn-agregar btn-sm flex-grow-1">
                    + Agregar
                  </button>
                </form>

                <!-- Botón deshabilitado si está agotado -->
                <button class="btn btn-secondary btn-sm mt-1 w-100" disabled
                  th:unless="${producto.disponibleParaCompra}">
                  Agotado
                </button>

              </div><!-- /card-body -->
            </div><!-- /card -->
          </div><!-- /col -->
        </div><!-- /row productos -->

      </div><!-- /col productos -->
    </div><!-- /row principal -->
  </div><!-- /container -->

  <!-- Bootstrap JS via WebJars -->
  <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
