<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      lang="es">

<head th:replace="~{general/fragmentos :: head}"/>

<body>

<header th:replace="~{general/fragmentos :: header}"/>

<!-- ── Mensajes ───────────────────────────────── -->
<div th:replace="~{fragmentos/navbar :: mensajes}"
     class="container-fluid px-4 pt-3"/>

<!-- ── Hero del catálogo ──────────────────────── -->
<section class="py-5 text-center" style="background: linear-gradient(180deg, #0a0010 0%, #000 100%); border-bottom: 1px solid var(--border);">
    <div class="container">
        <p class="label-xs mb-3" style="color:var(--purple-light);">Scentia Collection</p>
        <h1 class="serif display-luxury mb-3">Catálogo de Fragancias</h1>
        <p class="mb-5" style="color:var(--text-secondary); max-width:520px; margin:0 auto 2.5rem;">
            Descubre nuestra selección de perfumes premium, curados para quienes exigen lo extraordinario.
        </p>

        <!-- Búsqueda -->
        <form th:action="@{/catalogo}" method="get"
              class="d-flex justify-content-center gap-2 flex-wrap" style="max-width:520px; margin:0 auto;">
            <input type="text" name="buscar"
                   class="form-control-dark flex-grow-1"
                   placeholder="Buscar por nombre, marca..."
                   th:value="${buscar}"
                   style="min-width:220px;"/>
            <button type="submit" class="btn-luxury">Buscar</button>
            <a th:href="@{/catalogo}" class="btn-luxury-outline">Limpiar</a>
        </form>
    </div>
</section>

<!-- ── Layout principal ───────────────────────── -->
<section class="py-5" style="background:var(--bg-black); min-height:70vh;">
    <div class="container-fluid px-4 px-lg-5">
        <div class="row g-5">

            <!-- Sidebar categorías -->
            <div class="col-12 col-lg-2">
                <p class="label-xs mb-4">Categorías</p>
                <ul class="list-unstyled mb-0">
                    <li class="mb-3">
                        <a th:href="@{/catalogo}"
                           class="text-decoration-none small"
                           th:style="${categoriaActiva == null and buscar == null} ? 'color:#fff;' : 'color:var(--text-secondary);'">
                            <span th:if="${categoriaActiva == null and buscar == null}"
                                  style="display:inline-block; width:16px; height:1px; background:var(--purple); vertical-align:middle; margin-right:8px;"></span>
                            Todos
                        </a>
                    </li>
                    <li th:each="cat : ${categorias}" class="mb-3">
                        <a th:href="@{/catalogo(categoria=${cat})}"
                           th:text="${cat}"
                           class="text-decoration-none small"
                           th:style="${categoriaActiva == cat} ? 'color:#fff;' : 'color:var(--text-secondary);'">
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Grid de productos -->
            <div class="col-12 col-lg-10">

                <!-- Sin resultados -->
                <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
                    <i class="fas fa-wind mb-3" style="font-size:2.5rem; color:var(--text-muted);"></i>
                    <p class="mb-4" style="color:var(--text-secondary);">No se encontraron productos.</p>
                    <a th:href="@{/catalogo}" class="btn-luxury-outline">Ver catálogo completo</a>
                </div>

                <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 row-cols-xxl-4 g-4"
                     th:unless="${#lists.isEmpty(productos)}">

                    <div class="col animate-in" th:each="producto : ${productos}">
                        <div class="card-producto h-100">

                            <img th:src="${producto.imagenUrl != null and !#strings.isEmpty(producto.imagenUrl)}
                                         ? ${producto.imagenUrl}
                                         : '/images/placeholder-perfume.jpg'"
                                 th:alt="${producto.nombre}"
                                 class="card-img-top w-100"
                                 style="height:240px; object-fit:cover;"/>

                            <div class="p-4 d-flex flex-column h-100">

                                <!-- Badge disponibilidad -->
                                <span th:with="disp=${producto.disponibilidad}"
                                      class="badge-estado mb-3 align-self-start"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(disp.name())}"
                                      th:text="${disp.etiqueta}">Disponible</span>

                                <h6 class="text-white fw-bold mb-1" style="font-size:1rem;" th:text="${producto.nombre}">Nombre</h6>
                                <p class="label-xs mb-2" th:text="${producto.marca}" th:if="${producto.marca}"></p>
                                <p class="small mb-3" style="color:var(--text-secondary);"
                                   th:if="${producto.presentacion}"
                                   th:text="'Presentación: ' + ${producto.presentacion}"></p>

                                <p class="small flex-grow-1" style="color:var(--text-muted); line-height:1.7;"
                                   th:text="${#strings.abbreviate(producto.descripcion, 100)}"
                                   th:if="${producto.descripcion}"></p>

                                <div class="mt-auto pt-3" style="border-top:1px solid var(--border);">
                                    <p class="text-white mb-1" style="font-size:1.2rem; font-weight:300;"
                                       th:text="'₡' + ${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}">₡0.00</p>
                                    <p class="small mb-3" style="color:var(--text-muted);"
                                       th:text="${producto.stock} + ' unidades'"
                                       th:if="${producto.stock > 0}"></p>
                                    <p class="small mb-3" style="color:#e74c3c;"
                                       th:if="${producto.stock == 0}">Sin stock</p>

                                    <form th:action="@{/carrito/agregar}" method="post"
                                          th:if="${producto.disponibleParaCompra}"
                                          class="d-flex gap-2">
                                        <input type="hidden" name="productoId" th:value="${producto.id}"/>
                                        <input type="number" name="cantidad" value="1" min="1"
                                               th:max="${producto.stock}"
                                               class="form-control-dark" style="width:72px; text-align:center;"/>
                                        <button type="submit" class="btn-luxury flex-grow-1" style="font-size:0.7rem;">
                                            <i class="fas fa-plus me-1"></i> Agregar
                                        </button>
                                    </form>

                                    <button class="btn-ghost w-100 mt-1" disabled
                                            th:unless="${producto.disponibleParaCompra}"
                                            style="border:1px solid var(--border); color:var(--text-muted); cursor:not-allowed;">
                                        Agotado
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</section>

<section th:replace="~{general/fragmentos :: explorar}"/>
<section th:replace="~{general/fragmentos :: mostrarToast}"/>
<footer th:replace="~{general/fragmentos :: footer}"/>

</body>
</html>
