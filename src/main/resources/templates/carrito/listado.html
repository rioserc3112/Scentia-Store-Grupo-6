<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{general/fragmentos :: head}"/>

<body>

<header th:replace="~{general/fragmentos :: header}"/>

<div th:replace="~{fragmentos/navbar :: mensajes}" class="container-fluid px-4 pt-3"/>

<!-- ── Cabecera de página ─────────────────────── -->
<section class="py-4 border-bottom" style="background:var(--bg-black); border-color:var(--border) !important;">
    <div class="container-fluid px-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <p class="label-xs mb-1" style="color:var(--purple-light);">Resumen de compra</p>
                <h1 class="text-white fw-bold m-0" style="letter-spacing:-1.5px; font-size:2rem;">Mi Carrito</h1>
            </div>
            <a th:href="@{/catalogo}" class="btn-luxury-outline">
                <i class="fas fa-arrow-left me-2"></i> Seguir comprando
            </a>
        </div>
    </div>
</section>

<!-- ── Contenido ─────────────────────────────── -->
<section class="py-5" style="background:var(--bg-black); min-height:70vh;">
    <div class="container-fluid px-5">

        <!-- Carrito vacío -->
        <div th:if="${carrito == null or #lists.isEmpty(carrito.items)}"
             class="text-center py-5">
            <i class="fas fa-shopping-bag mb-4" style="font-size:3rem; color:var(--text-muted);"></i>
            <h4 class="text-white fw-light mb-2">Tu carrito está vacío</h4>
            <p class="mb-5" style="color:var(--text-secondary);">Agrega fragancias al carrito para continuar.</p>
            <a th:href="@{/catalogo}" class="btn-luxury">Ir al catálogo</a>
        </div>

        <!-- Carrito con items -->
        <div th:unless="${carrito == null or #lists.isEmpty(carrito.items)}" class="row g-5">

            <!-- Tabla de items -->
            <div class="col-12 col-lg-8">
                <table class="table-premium w-100">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th class="text-center">Precio</th>
                            <th class="text-center">Cantidad</th>
                            <th class="text-center">Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${carrito.items}" class="animate-in">

                            <!-- Producto -->
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="${item.imagenUrl != null and !#strings.isEmpty(item.imagenUrl)}
                                                   ? ${item.imagenUrl}
                                                   : '/images/placeholder-perfume.jpg'"
                                         th:alt="${item.nombreProducto}"
                                         class="img-product-sharp"
                                         style="width:72px; height:72px; object-fit:cover; border:1px solid var(--border);"/>
                                    <div>
                                        <p class="text-white fw-bold mb-0" style="font-size:0.95rem;" th:text="${item.nombreProducto}"></p>
                                        <p class="label-xs mb-0 mt-1" th:text="${item.marcaProducto}" th:if="${item.marcaProducto}"></p>
                                        <p class="small mt-1 mb-0" style="color:var(--text-muted);" th:text="${item.presentacionProducto}" th:if="${item.presentacionProducto}"></p>
                                    </div>
                                </div>
                            </td>

                            <!-- Precio unitario -->
                            <td class="text-center text-white"
                                th:text="'₡' + ${#numbers.formatDecimal(item.precioUnitario, 1, 'COMMA', 2, 'POINT')}">₡0.00</td>

                            <!-- Cantidad -->
                            <td class="text-center">
                                <form th:action="@{/carrito/actualizar}" method="post"
                                      class="d-flex gap-2 align-items-center justify-content-center">
                                    <input type="hidden" name="productoId" th:value="${item.productoId}"/>
                                    <input type="number" name="cantidad" min="1"
                                           th:value="${item.cantidad}"
                                           class="form-control-dark text-center"
                                           style="width:68px;"/>
                                    <button type="submit" class="btn-ghost" style="border:1px solid var(--border); padding:8px 12px; font-size:0.65rem;">OK</button>
                                </form>
                            </td>

                            <!-- Subtotal -->
                            <td class="text-center text-white fw-bold"
                                th:text="'₡' + ${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}">₡0.00</td>

                            <!-- Eliminar -->
                            <td class="text-end">
                                <form th:action="@{/carrito/eliminar}" method="post">
                                    <input type="hidden" name="productoId" th:value="${item.productoId}"/>
                                    <button type="submit" class="btn-text-action btn-text-delete">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </form>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Resumen -->
            <div class="col-12 col-lg-4">
                <div class="resumen-luxury p-4">
                    <p class="label-xs mb-4">Resumen del pedido</p>

                    <div class="d-flex justify-content-between mb-3">
                        <span class="small" style="color:var(--text-secondary);">Subtotal</span>
                        <span class="text-white small"
                              th:text="'₡' + ${#numbers.formatDecimal(carrito.total, 1, 'COMMA', 2, 'POINT')}">₡0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="small" style="color:var(--text-secondary);">Envío</span>
                        <span class="small" style="color:var(--purple-light);">A calcular</span>
                    </div>

                    <div class="resumen-total-line d-flex justify-content-between mb-4">
                        <span class="text-white fw-bold">Total</span>
                        <span class="text-white fw-bold" style="font-size:1.1rem;"
                              th:text="'₡' + ${#numbers.formatDecimal(carrito.total, 1, 'COMMA', 2, 'POINT')}">₡0.00</span>
                    </div>

                    <form th:action="@{/carrito/confirmar}" method="post" class="mb-3">
                        <button type="submit" class="btn-luxury w-100">
                            <i class="fas fa-lock me-2"></i> Confirmar compra
                        </button>
                    </form>

                    <a th:href="@{/pedido/listado}" class="btn-luxury-outline w-100 text-center d-block text-decoration-none"
                       style="padding:10px; font-size:0.72rem; letter-spacing:1.5px;">
                        Ver mis pedidos
                    </a>
                </div>
            </div>

        </div>
    </div>
</section>

<section th:replace="~{general/fragmentos :: mostrarToast}"/>
<footer th:replace="~{general/fragmentos :: footer}"/>

</body>
</html>
