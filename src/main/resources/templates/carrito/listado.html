<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carrito de compras — Scentia Store</title>

  <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />

  <style>
    body {
      background-color: #f8f5f0;
    }

    .section-title {
      font-family: Georgia, serif;
    }

    .img-carrito {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      background: #ece8e1;
    }

    .resumen-card {
      border: none;
      border-radius: 16px;
    }
  </style>
</head>

<body>

  <div th:replace="~{fragmentos/navbar :: navbar}"></div>

  <div class="container my-4">

    <div th:replace="~{fragmentos/navbar :: mensajes}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 section-title mb-0">Carrito de compras</h1>
      <a th:href="@{/catalogo}" class="btn btn-outline-dark btn-sm">Seguir comprando</a>
    </div>

    <div th:if="${carrito == null or #lists.isEmpty(carrito.items)}" class="text-center py-5">
      <h4 class="mb-3">Tu carrito está vacío</h4>
      <p class="text-muted">Agrega perfumes al carrito para continuar con tu compra.</p>
      <a th:href="@{/catalogo}" class="btn btn-dark">Ir al catálogo</a>
    </div>

    <div th:unless="${carrito == null or #lists.isEmpty(carrito.items)}" class="row g-4">

      <div class="col-12 col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="item : ${carrito.items}">
                    <td>
                      <div class="d-flex align-items-center gap-3">
                        <img th:src="${item.imagenUrl != null and !#strings.isEmpty(item.imagenUrl)} 
                                                           ? ${item.imagenUrl} 
                                                           : '/images/placeholder-perfume.jpg'"
                          th:alt="${item.nombreProducto}" class="img-carrito" />
                        <div>
                          <div class="fw-bold" th:text="${item.nombreProducto}">Perfume</div>
                          <div class="text-muted small" th:text="${item.marcaProducto}">Marca</div>
                          <div class="text-secondary small" th:text="${item.presentacionProducto}">Presentación</div>
                        </div>
                      </div>
                    </td>

                    <td th:text="'₡' + ${#numbers.formatDecimal(item.precioUnitario, 1, 'COMMA', 2, 'POINT')}">
                      ₡0.00
                    </td>

                    <td>
                      <form th:action="@{/carrito/actualizar}" method="post" class="d-flex gap-2 align-items-center">
                        <input type="hidden" name="productoId" th:value="${item.productoId}" />
                        <input type="number" name="cantidad" min="1" th:value="${item.cantidad}"
                          class="form-control form-control-sm" style="width:80px" />
                        <button type="submit" class="btn btn-outline-dark btn-sm">Actualizar</button>
                      </form>
                    </td>

                    <td th:text="'₡' + ${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}">
                      ₡0.00
                    </td>

                    <td>
                      <form th:action="@{/carrito/eliminar}" method="post">
                        <input type="hidden" name="productoId" th:value="${item.productoId}" />
                        <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar</button>
                      </form>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card shadow-sm resumen-card">
          <div class="card-body">
            <h5 class="fw-bold mb-3">Resumen del pedido</h5>

            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal</span>
              <strong th:text="'₡' + ${#numbers.formatDecimal(carrito.total, 1, 'COMMA', 2, 'POINT')}">₡0.00</strong>
            </div>

            <div class="d-flex justify-content-between mb-3">
              <span>Total</span>
              <strong th:text="'₡' + ${#numbers.formatDecimal(carrito.total, 1, 'COMMA', 2, 'POINT')}">₡0.00</strong>
            </div>

            <form th:action="@{/carrito/confirmar}" method="post">
              <button type="submit" class="btn btn-dark w-100">Confirmar compra</button>
            </form>

            <a th:href="@{/pedido/listado}" class="btn btn-outline-secondary w-100 mt-2">
              Ver pedidos realizados
            </a>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
