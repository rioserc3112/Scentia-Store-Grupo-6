<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{general/fragmentos :: head}"/>

<body>

<!-- Sin navbar en login — pantalla de bienvenida -->
<div class="d-flex align-items-center justify-content-center"
     style="min-height:100vh; background: radial-gradient(ellipse at 60% 40%, #1a0030 0%, #000 70%);">

    <div class="auth-card animate-in">

        <!-- Encabezado -->
        <div class="auth-header text-center">
            <p class="label-xs mb-2" style="color:var(--purple-light);">Bienvenido de vuelta</p>
            <h1 class="serif text-white" style="font-size:2rem;">Iniciar sesión</h1>
            <p class="small mt-2 mb-0" style="color:var(--text-muted);">Scentia Store · Fragancias premium</p>
        </div>

        <!-- Body -->
        <div class="auth-body">

            <!-- Alertas -->
            <div th:if="${mensajeError}"
                 class="mb-4 p-3 animate-in"
                 style="background:rgba(231,76,60,0.08); border:1px solid rgba(231,76,60,0.3); color:#e74c3c; font-size:0.85rem;">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${mensajeError}"></span>
            </div>
            <div th:if="${mensajeExito}"
                 class="mb-4 p-3 animate-in"
                 style="background:rgba(39,174,96,0.08); border:1px solid rgba(39,174,96,0.3); color:#27ae60; font-size:0.85rem;">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${mensajeExito}"></span>
            </div>

            <!-- Formulario -->
            <form th:action="@{/auth/login}" method="post">

                <div class="mb-4">
                    <label class="label-xs d-block mb-2">Correo electrónico</label>
                    <input type="email" name="correo" class="form-control-dark w-100"
                           placeholder="tu@correo.com" required/>
                </div>

                <div class="mb-5">
                    <label class="label-xs d-block mb-2">Contraseña</label>
                    <input type="password" name="password" class="form-control-dark w-100"
                           placeholder="••••••••" required/>
                </div>

                <button type="submit" class="btn-luxury w-100">
                    Ingresar <i class="fas fa-arrow-right ms-2"></i>
                </button>

            </form>

            <div class="text-center mt-4">
                <a th:href="@{/auth/registro}"
                   class="text-decoration-none small"
                   style="color:var(--text-secondary);">
                    ¿No tienes cuenta?
                    <span style="color:var(--purple-light); margin-left:4px;">Regístrate</span>
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
