<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<!--
    fragmentos/navbar.html
    ─────────────────────────────────────────────────────────
    Este archivo redirige al fragmento centralizado en general/fragmentos.html
    para mantener compatibilidad con páginas que usan ~{fragmentos/navbar :: navbar}
-->

<nav th:fragment="navbar" th:replace="~{general/fragmentos :: header}"></nav>

<div th:fragment="mensajes" xmlns:th="http://www.thymeleaf.org">
    <div th:if="${mensajeExito}"
         class="alert animate-in mb-0"
         style="background:rgba(39,174,96,0.1); border:1px solid rgba(39,174,96,0.3); border-radius:0; color:#2ecc71;"
         role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"
                style="filter:invert(1); opacity:0.5;"></button>
    </div>
    <div th:if="${mensajeError}"
         class="alert animate-in mb-0"
         style="background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3); border-radius:0; color:#e74c3c;"
         role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"
                style="filter:invert(1); opacity:0.5;"></button>
    </div>
</div>

</html>
