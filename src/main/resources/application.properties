
spring.application.name=scentia-store

server.port=80 

# ── Base de datos MySQL ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/scentia_store?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=2442
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ── Sesión HTTP ──────────────────────────────────────────────────────────────
# El carrito se guarda en sesión, que por defecto dura 30 minutos
server.servlet.session.timeout=30m

spring.web.resources.static-locations=classpath:/static/
